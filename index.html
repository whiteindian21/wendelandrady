<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wendel Andrady | AI Systems & Business Automation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
  <script src="https://unpkg.com/three@0.132.2/build/three.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config={theme:{extend:{colors:{
      accent:'#C8F04B',
      'accent-dim':'#a8cc35',
      'accent-warm':'#F0B429',
      dark:'#080808',
      'dark-card':'#0d0d0d',
      'dark-border':'#1c1c1c',
      'dark-muted':'#666666',
      'dark-subtle':'#444444'
    },fontFamily:{
      heading:['"Bebas Neue"','sans-serif'],
      body:['"DM Sans"','sans-serif'],
      mono:['"DM Mono"','monospace']
    }}}}
  </script>
  <style>
    *{cursor:none}
    body{background:#080808;color:#e8e8e8;font-family:'DM Sans',sans-serif;overflow-x:hidden}
    ::-webkit-scrollbar{width:2px}
    ::-webkit-scrollbar-track{background:#080808}
    ::-webkit-scrollbar-thumb{background:#C8F04B;border-radius:2px}
    ::selection{background:rgba(200,240,75,.2);color:#fff}
    .dot-bg{background-image:radial-gradient(circle,rgba(255,255,255,.04) 1px,transparent 1px);background-size:28px 28px}
    .text-lime{color:#C8F04B}
    .bg-lime{background:#C8F04B}
    .border-lime{border-color:#C8F04B}
    .glow-lime{box-shadow:0 0 40px rgba(200,240,75,.12),0 0 80px rgba(200,240,75,.04)}
    .glow-lime-strong{box-shadow:0 0 30px rgba(200,240,75,.22),0 0 60px rgba(200,240,75,.08)}
    .tag{display:inline-flex;align-items:center;padding:4px 12px;border:1px solid #1c1c1c;border-radius:999px;font-size:11px;font-family:'DM Mono',monospace;color:#666;letter-spacing:.08em;text-transform:uppercase}
    .tag:hover{border-color:rgba(200,240,75,.3);color:#C8F04B;transition:all .3s}
    .card{background:#0d0d0d;border:1px solid #1c1c1c;border-radius:16px;padding:28px;transition:border-color .4s,box-shadow .4s}
    .card:hover{border-color:rgba(200,240,75,.2);box-shadow:0 0 40px rgba(200,240,75,.06)}
    .pill{background:rgba(200,240,75,.08);color:#C8F04B;border:1px solid rgba(200,240,75,.15);border-radius:999px;padding:5px 14px;font-size:11px;font-family:'DM Mono',monospace;letter-spacing:.08em;text-transform:uppercase}
    .marquee-wrap{overflow:hidden}
    .marquee-inner{display:inline-flex;animation:marquee 30s linear infinite;white-space:nowrap}
    .marquee-inner-rev{animation-direction:reverse;animation-duration:36s}
    @keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
    .number-big{font-family:'Bebas Neue',sans-serif;font-size:clamp(56px,8vw,96px);line-height:1;color:#C8F04B}
    .section-label{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:#444;margin-bottom:16px;display:block}
    .step-num{font-family:'Bebas Neue',sans-serif;font-size:64px;line-height:1;color:rgba(200,240,75,.15);position:absolute;top:-10px;left:-6px}
    .input-field{width:100%;padding:14px 18px;background:#0d0d0d;border:1px solid #1c1c1c;border-radius:12px;color:#e8e8e8;font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:border-color .3s,box-shadow .3s}
    .input-field:focus{border-color:rgba(200,240,75,.4);box-shadow:0 0 0 1px rgba(200,240,75,.1)}
    .input-field::placeholder{color:#444}
    .btn-primary{background:#C8F04B;color:#080808;font-family:'DM Sans',sans-serif;font-weight:600;padding:15px 32px;border-radius:999px;font-size:15px;letter-spacing:.01em;transition:background .25s,box-shadow .25s;box-shadow:0 0 30px rgba(200,240,75,.2)}
    .btn-primary:hover{background:#a8cc35;box-shadow:0 0 50px rgba(200,240,75,.35)}
    .btn-secondary{background:transparent;color:#e8e8e8;font-family:'DM Sans',sans-serif;font-weight:500;padding:15px 32px;border-radius:999px;font-size:15px;border:1px solid #1c1c1c;transition:border-color .25s,color .25s}
    .btn-secondary:hover{border-color:rgba(200,240,75,.3);color:#C8F04B}
    .problem-item{display:flex;gap:16px;align-items:flex-start;padding:20px 0;border-bottom:1px solid #1c1c1c}
    .problem-item:last-child{border-bottom:none}
    .x-icon{width:20px;height:20px;border-radius:50%;background:rgba(255,80,80,.1);border:1px solid rgba(255,80,80,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
    .check-icon{width:20px;height:20px;border-radius:50%;background:rgba(200,240,75,.1);border:1px solid rgba(200,240,75,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
    @media(hover:none){*{cursor:auto!important}.custom-cursor{display:none!important}a,button,input,textarea{cursor:auto}}
    @media(max-width:768px){
      .hero-headline{font-size:clamp(52px,14vw,80px)!important}
      .hide-mobile{display:none!important}
    }
  </style>
</head>
<body class="dot-bg">
<div id="root"></div>
<script type="text/babel">
const{useState,useRef,useEffect,useCallback}=React;
const{motion,AnimatePresence,useInView}=window.Motion;

/* ── CURSOR ── */
function CustomCursor(){
  const dot=useRef(null),ring=useRef(null);
  useEffect(()=>{
    let mx=0,my=0,rx=0,ry=0;
    const move=e=>{mx=e.clientX;my=e.clientY;
      if(dot.current)dot.current.style.transform=`translate(${mx-4}px,${my-4}px)`;
      const t=e.target.closest('a,button,input,textarea,[data-hover]');
      if(ring.current){const s=t?'52px':'38px',o=t?-26:-19;
        ring.current.style.width=s;ring.current.style.height=s;
        ring.current.style.left=o+'px';ring.current.style.top=o+'px';
        ring.current.style.borderColor=t?'#C8F04B':'rgba(200,240,75,0.3)';
        ring.current.style.opacity=t?'1':'0.5'}};
    const loop=()=>{rx+=(mx-rx)*.12;ry+=(my-ry)*.12;
      if(ring.current)ring.current.style.transform=`translate(${rx}px,${ry}px)`;
      requestAnimationFrame(loop)};
    window.addEventListener('mousemove',move);loop();
    return()=>window.removeEventListener('mousemove',move)},[]);
  return(<>
    <div ref={dot} className="custom-cursor fixed w-2 h-2 rounded-full pointer-events-none z-[10000]" style={{background:'#C8F04B',mixBlendMode:'difference'}}/>
    <div ref={ring} className="custom-cursor fixed w-[38px] h-[38px] border rounded-full pointer-events-none z-[10000] transition-[width,height,left,top,border-color,opacity] duration-200 ease-out" style={{borderColor:'rgba(200,240,75,0.3)'}}/>
  </>);
}

/* ── SCROLL PROGRESS ── */
function ScrollProgress(){
  const[p,setP]=useState(0);
  useEffect(()=>{const h=()=>{const t=document.documentElement.scrollHeight-window.innerHeight;setP(window.scrollY/t*100)};
    window.addEventListener('scroll',h);return()=>window.removeEventListener('scroll',h)},[]);
  return<div className="fixed top-0 left-0 h-[2px] z-[9997]" style={{width:`${p}%`,background:'#C8F04B'}}/>;
}

/* ── REVEAL ── */
function Reveal({children,delay=0,className='',y=30}){
  return<motion.div initial={{opacity:0,y}} whileInView={{opacity:1,y:0}} viewport={{once:true,margin:'-50px'}}
    transition={{duration:.65,delay,ease:[.215,.61,.355,1]}} className={className}>{children}</motion.div>;
}

/* ── THREE SCENE ── */
function ThreeScene(){
  const mount=useRef(null);
  useEffect(()=>{
    const mob=window.innerWidth<768,scene=new THREE.Scene(),w=window.innerWidth,h=window.innerHeight;
    const cam=new THREE.PerspectiveCamera(60,w/h,.1,100);cam.position.z=5;
    const ren=new THREE.WebGLRenderer({alpha:true,antialias:true});ren.setSize(w,h);
    ren.setPixelRatio(Math.min(window.devicePixelRatio,mob?1.5:2));mount.current.appendChild(ren.domElement);
    const outer=new THREE.Mesh(new THREE.IcosahedronGeometry(2,1),new THREE.MeshBasicMaterial({color:0xC8F04B,wireframe:true,transparent:true,opacity:.04}));
    const inner=new THREE.Mesh(new THREE.IcosahedronGeometry(1.2,1),new THREE.MeshBasicMaterial({color:0xF0B429,wireframe:true,transparent:true,opacity:.05}));
    scene.add(outer,inner);
    const mkTex=c=>{const cv=document.createElement('canvas');cv.width=cv.height=64;const x=cv.getContext('2d');
      const g=x.createRadialGradient(32,32,0,32,32,32);g.addColorStop(0,c);g.addColorStop(.4,c.replace(',1)',',0.4)'));g.addColorStop(1,c.replace(',1)',',0)'));
      x.fillStyle=g;x.fillRect(0,0,64,64);return new THREE.CanvasTexture(cv)};
    const mkPts=(n,col,sz,op,rad1,rad2)=>{const pos=new Float32Array(n*3);
      for(let i=0;i<n;i++){const r=rad1+Math.random()*rad2,th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1);
        pos[i*3]=r*Math.sin(ph)*Math.cos(th);pos[i*3+1]=r*Math.sin(ph)*Math.sin(th);pos[i*3+2]=r*Math.cos(ph)}
      const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.BufferAttribute(pos,3));
      return new THREE.Points(g,new THREE.PointsMaterial({map:mkTex(col),size:sz,transparent:true,opacity:op,blending:THREE.AdditiveBlending,depthWrite:false,sizeAttenuation:true}))};
    const p1=mkPts(mob?180:700,'rgba(200,240,75,1)',mob?.05:.035,.4,2.5,5);
    const p2=mkPts(mob?50:200,'rgba(240,180,41,1)',mob?.04:.025,.25,3,4);
    scene.add(p1,p2);
    let mx=0,my=0;const onM=e=>{mx=(e.clientX/window.innerWidth)*2-1;my=-(e.clientY/window.innerHeight)*2+1};
    window.addEventListener('mousemove',onM);
    const animate=()=>{requestAnimationFrame(animate);const t=performance.now()*.001;
      outer.rotation.x=t*.03+my*.15;outer.rotation.y=t*.05+mx*.15;
      inner.rotation.x=-t*.025+my*.1;inner.rotation.y=-t*.04+mx*.1;
      p1.rotation.y=t*.008;p1.rotation.x=Math.sin(t*.006)*.05;
      p2.rotation.y=-t*.006;p2.rotation.z=Math.cos(t*.004)*.04;
      ren.render(scene,cam)};animate();
    const onR=()=>{cam.aspect=window.innerWidth/window.innerHeight;cam.updateProjectionMatrix();ren.setSize(window.innerWidth,window.innerHeight)};
    window.addEventListener('resize',onR);
    return()=>{try{window.removeEventListener('resize',onR);window.removeEventListener('mousemove',onM);if(mount.current&&ren.domElement.parentNode===mount.current)mount.current.removeChild(ren.domElement)}catch(e){}}
  },[]);
  return<div ref={mount} className="fixed inset-0 -z-10"/>;
}

/* ── PRELOADER ── */
function Preloader({onDone}){
  const[c,setC]=useState(0);
  useEffect(()=>{const iv=setInterval(()=>setC(p=>{if(p>=100){clearInterval(iv);setTimeout(onDone,400);return 100}return p+2}),20);return()=>clearInterval(iv)},[]);
  return<motion.div exit={{y:'-100%'}} transition={{duration:.75,ease:[.76,0,.24,1]}}
    className="fixed inset-0 z-[9998] flex flex-col items-center justify-center" style={{background:'#080808'}}>
    <motion.span style={{fontFamily:'Bebas Neue',fontSize:'clamp(80px,12vw,140px)',color:'#C8F04B',fontVariantNumeric:'tabular-nums',lineHeight:1}}>{c}</motion.span>
    <div className="mt-5 w-40 h-[1px] overflow-hidden" style={{background:'#1c1c1c'}}>
      <motion.div className="h-full" initial={{width:'0%'}} animate={{width:`${c}%`}} style={{background:'#C8F04B'}}/></div>
    <span className="mt-4 text-xs font-mono" style={{color:'#333',letterSpacing:'.25em'}}>LOADING</span>
  </motion.div>;
}

/* ── NAVBAR ── */
function Navbar({refs}){
  const[sc,setSc]=useState(false),[op,setOp]=useState(false);
  useEffect(()=>{const h=()=>setSc(window.scrollY>50);window.addEventListener('scroll',h);return()=>window.removeEventListener('scroll',h)},[]);
  const go=r=>{r.current.scrollIntoView({behavior:'smooth'});setOp(false)};
  const items=[{n:'Problem',r:refs.problemRef},{n:'Services',r:refs.servicesRef},{n:'Work',r:refs.projectsRef},{n:'Process',r:refs.processRef},{n:'Contact',r:refs.contactRef}];
  return<motion.nav initial={{opacity:0,y:-20}} animate={{opacity:1,y:0}} transition={{duration:.6,delay:1.5}}
    className="fixed w-full z-50 transition-all duration-500"
    style={{background:sc?'rgba(8,8,8,0.85)':'transparent',backdropFilter:sc?'blur(20px)':'none',borderBottom:sc?'1px solid #1c1c1c':'none',padding:sc?'12px 0':'20px 0'}}>
    <div className="max-w-6xl mx-auto px-6 flex justify-between items-center">
      <motion.button whileHover={{scale:1.05}} onClick={()=>refs.heroRef.current.scrollIntoView({behavior:'smooth'})}
        className="font-heading text-xl tracking-wider text-white" data-hover>
        WA<span style={{color:'#C8F04B'}}>.</span>
      </motion.button>
      <div className="hidden md:flex items-center gap-1">
        {items.map(it=><motion.button key={it.n} whileTap={{scale:.95}} onClick={()=>go(it.r)}
          className="px-4 py-2 text-sm font-body transition-colors duration-300 relative group" style={{color:'#666'}}
          onMouseEnter={e=>e.target.style.color='#C8F04B'} onMouseLeave={e=>e.target.style.color='#666'} data-hover>
          {it.n}
        </motion.button>)}
        <motion.button whileTap={{scale:.95}} onClick={()=>go(refs.contactRef)} className="btn-primary ml-3 text-sm py-2.5 px-6" data-hover>
          Book a Call
        </motion.button>
      </div>
      <motion.button whileTap={{scale:.9}} onClick={()=>setOp(!op)} className="md:hidden w-10 h-10 flex flex-col items-center justify-center gap-1.5" data-hover>
        <motion.span animate={op?{rotate:45,y:6}:{rotate:0,y:0}} className="w-5 h-[1.5px] block origin-center" style={{background:'#C8F04B'}}/>
        <motion.span animate={op?{opacity:0}:{opacity:1}} className="w-5 h-[1.5px] block" style={{background:'#C8F04B'}}/>
        <motion.span animate={op?{rotate:-45,y:-6}:{rotate:0,y:0}} className="w-5 h-[1.5px] block origin-center" style={{background:'#C8F04B'}}/>
      </motion.button>
    </div>
    <AnimatePresence>{op&&<motion.div initial={{opacity:0,height:0}} animate={{opacity:1,height:'auto'}} exit={{opacity:0,height:0}} transition={{duration:.3}}
      className="md:hidden overflow-hidden" style={{background:'rgba(8,8,8,.96)',backdropFilter:'blur(20px)',borderTop:'1px solid #1c1c1c'}}>
      <div className="px-6 py-4 space-y-1">
        {items.map((it,i)=><motion.button key={it.n} initial={{opacity:0,x:-16}} animate={{opacity:1,x:0}} transition={{delay:i*.04}}
          onClick={()=>go(it.r)} className="block w-full text-left py-3 text-lg font-body" style={{color:'#666'}}>{it.n}</motion.button>)}
        <motion.button initial={{opacity:0,x:-16}} animate={{opacity:1,x:0}} transition={{delay:.25}}
          onClick={()=>go(refs.contactRef)} className="btn-primary w-full mt-4 text-center block">Book a Call</motion.button>
      </div>
    </motion.div>}</AnimatePresence>
  </motion.nav>;
}

/* ── HERO ── */
function Hero({refs}){
  return<section ref={refs.heroRef} className="relative min-h-screen flex items-center justify-center overflow-hidden" style={{paddingTop:'80px'}}>
    <ThreeScene/>
    <div className="absolute inset-0 pointer-events-none" style={{background:'linear-gradient(to bottom,#080808 0%,transparent 20%,transparent 80%,#080808 100%)'}}/>
    <div className="relative z-10 text-center px-6 max-w-5xl w-full">
      <Reveal delay={1.7}>
        <span className="pill mb-6 inline-block">AI Systems & Business Automation</span>
      </Reveal>
      <div className="overflow-hidden mb-6">
        <motion.h1 initial={{y:120,opacity:0}} animate={{y:0,opacity:1}} transition={{duration:.8,delay:1.9,ease:[.215,.61,.355,1]}}
          className="hero-headline font-heading leading-none uppercase"
          style={{fontSize:'clamp(52px,10vw,120px)',letterSpacing:'-.01em'}}>
          Stop Losing<br/><span style={{color:'#C8F04B'}}>Clients & Time</span><br/>to Bad Systems
        </motion.h1>
      </div>
      <Reveal delay={2.3}>
        <p className="text-lg md:text-xl max-w-2xl mx-auto mb-10 leading-relaxed font-light" style={{color:'#888'}}>
          I build AI-powered systems that <span style={{color:'#e8e8e8'}}>generate leads automatically</span>, <span style={{color:'#e8e8e8'}}>cut manual work by 80%</span>, and <span style={{color:'#e8e8e8'}}>give your business the infrastructure to scale</span> — delivered in 5–7 days.
        </p>
      </Reveal>
      <Reveal delay={2.5} className="flex flex-col sm:flex-row items-center justify-center gap-4">
        <motion.button whileHover={{scale:1.04}} whileTap={{scale:.97}} onClick={()=>refs.contactRef.current.scrollIntoView({behavior:'smooth'})}
          className="btn-primary glow-lime-strong" data-hover>
          Book a Free Call →
        </motion.button>
        <motion.button whileHover={{scale:1.04}} whileTap={{scale:.97}} onClick={()=>refs.projectsRef.current.scrollIntoView({behavior:'smooth'})}
          className="btn-secondary" data-hover>
          See Real Results
        </motion.button>
      </Reveal>
      <Reveal delay={2.8} className="mt-12 flex flex-wrap items-center justify-center gap-6">
        {[{n:'10+',l:'Systems Built'},{n:'5–7',l:'Days to Launch'},{n:'$0',l:'Wasted on Guesswork'}].map((s,i)=>
          <div key={i} className="text-center">
            <div className="font-heading text-3xl md:text-4xl" style={{color:'#C8F04B'}}>{s.n}</div>
            <div className="text-xs font-mono mt-1" style={{color:'#444',letterSpacing:'.1em'}}>{s.l}</div>
          </div>)}
      </Reveal>
    </div>
    <motion.div className="absolute bottom-8 left-1/2 -translate-x-1/2 z-10" animate={{y:[0,8,0]}} transition={{duration:2.5,repeat:Infinity,ease:'easeInOut'}}>
      <div className="w-5 h-8 border rounded-full flex justify-center pt-1.5" style={{borderColor:'#1c1c1c'}}>
        <motion.div className="w-1 h-2 rounded-full" style={{background:'rgba(200,240,75,.4)'}} animate={{y:[0,8,0],opacity:[1,.2,1]}} transition={{duration:2.5,repeat:Infinity,ease:'easeInOut'}}/>
      </div>
    </motion.div>
  </section>;
}

/* ── MARQUEE ── */
function Marquee({text,reverse=false}){
  const t=`${text}  —  ${text}  —  ${text}  —  ${text}  —  `;
  return<div className="marquee-wrap py-5 md:py-6 border-y" style={{borderColor:'#1c1c1c'}}>
    <div className={`marquee-inner ${reverse?'marquee-inner-rev':''}`}>
      <span className="font-heading text-5xl md:text-7xl" style={{color:'rgba(255,255,255,.06)'}}>{t}</span>
    </div>
  </div>;
}

/* ── PROBLEM ── */
function ProblemSection({sectionRef}){
  const problems=[
    {text:'You\'re losing potential clients because your follow-up is slow or nonexistent',detail:'Every hour without a response costs you deals'},
    {text:'Your team spends hours every week on tasks a computer could handle in seconds',detail:'Scheduling, data entry, lead sorting — all unnecessary manual work'},
    {text:'Your website looks good but doesn\'t actually convert visitors into paying clients',detail:'Pretty isn\'t profitable. Systems are.'},
    {text:'You don\'t have a central system — just a pile of apps that don\'t talk to each other',detail:'Fragmented tools = missed revenue and exhausted teams'},
  ];
  return<section ref={sectionRef} className="py-24 md:py-32 relative" style={{background:'#080808'}}>
    <div className="max-w-6xl mx-auto px-6">
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-16 items-start">
        <div>
          <Reveal><span className="section-label">01 — the problem</span></Reveal>
          <Reveal delay={.1}>
            <h2 className="font-heading uppercase leading-none mb-6" style={{fontSize:'clamp(42px,6vw,72px)',letterSpacing:'-.01em'}}>
              Your business is<br/>leaking money<br/><span style={{color:'#C8F04B'}}>every single day</span>
            </h2>
          </Reveal>
          <Reveal delay={.2}>
            <p className="text-base leading-relaxed mb-8" style={{color:'#666'}}>
              Most service businesses are running on broken systems — slow follow-up, manual processes, and no automation. The result? Revenue left on the table, time wasted, and growth stalled.
            </p>
          </Reveal>
          <Reveal delay={.3}>
            <motion.button whileHover={{scale:1.04}} whileTap={{scale:.97}}
              className="btn-primary" data-hover onClick={()=>document.getElementById('contact-section').scrollIntoView({behavior:'smooth'})}>
              Fix My Systems →
            </motion.button>
          </Reveal>
        </div>
        <div>
          {problems.map((p,i)=>
            <Reveal key={i} delay={i*.08}>
              <div className="problem-item">
                <div className="x-icon">
                  <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 2l6 6M8 2l-6 6" stroke="rgba(255,80,80,.7)" strokeWidth="1.5" strokeLinecap="round"/></svg>
                </div>
                <div>
                  <p className="text-sm font-medium mb-1" style={{color:'#e8e8e8'}}>{p.text}</p>
                  <p className="text-xs leading-relaxed" style={{color:'#555'}}>{p.detail}</p>
                </div>
              </div>
            </Reveal>)}
        </div>
      </div>
    </div>
  </section>;
}

/* ── SERVICES ── */
