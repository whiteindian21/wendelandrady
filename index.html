<!DOCTYPE html>

<head>

<body class="noise grid-bg">
<div id="root"></div>
<script type="text/babel">
const{useState,useRef,useEffect}=React;
const{motion,AnimatePresence}=window.Motion;

/* ═══ CUSTOM CURSOR ═══ */
function CustomCursor(){
  const dot=useRef(null),ring=useRef(null);
  useEffect(()=>{
    let mx=0,my=0,rx=0,ry=0;
    const move=e=>{mx=e.clientX;my=e.clientY;
      if(dot.current)dot.current.style.transform=`translate(${mx-4}px,${my-4}px)`;
      const t=e.target.closest('a,button,input,textarea,[data-hover]');
      if(ring.current){const s=t?'56px':'40px',o=t?-28:-20;
        ring.current.style.width=s;ring.current.style.height=s;
        ring.current.style.left=o+'px';ring.current.style.top=o+'px';
        ring.current.style.borderColor=t?'#00ffd5':'rgba(0,255,213,0.3)';
        ring.current.style.opacity=t?'1':'0.5'}};
    const loop=()=>{rx+=(mx-rx)*.11;ry+=(my-ry)*.11;
      if(ring.current)ring.current.style.transform=`translate(${rx}px,${ry}px)`;
      requestAnimationFrame(loop)};
    window.addEventListener('mousemove',move);loop();
    return()=>window.removeEventListener('mousemove',move)},[]);
  return(<><div ref={dot} className="custom-cursor fixed w-2 h-2 bg-accent rounded-full pointer-events-none z-[10000] mix-blend-difference"/>
    <div ref={ring} className="custom-cursor fixed w-[40px] h-[40px] border border-accent/30 rounded-full pointer-events-none z-[10000] transition-[width,height,left,top,border-color,opacity] duration-200 ease-out"/></>);
}

/* ═══ SCROLL PROGRESS ═══ */
function ScrollProgress(){
  const[p,setP]=useState(0);
  useEffect(()=>{const h=()=>{const t=document.documentElement.scrollHeight-window.innerHeight;setP(window.scrollY/t*100)};
    window.addEventListener('scroll',h);return()=>window.removeEventListener('scroll',h)},[]);
  return<motion.div className="fixed top-0 left-0 h-[2px] bg-accent z-[9997]" style={{width:`${p}%`}}/>;
}

/* ═══ SPLIT TEXT ═══ */
function SplitText({text,className='',delay=0}){
  return<span className={className}>{text.split('').map((c,i)=>
    <motion.span key={i} initial={{opacity:0,y:55,rotateX:-35}} animate={{opacity:1,y:0,rotateX:0}}
      transition={{duration:.55,delay:delay+i*.022,ease:[.215,.61,.355,1]}} className="inline-block" style={{transformOrigin:'bottom'}}>{c===' '?'\u00A0':c}</motion.span>
  )}</span>;
}

/* ═══ REVEAL ═══ */
function Reveal({children,delay=0,className='',y=45}){
  return<motion.div initial={{opacity:0,y}} whileInView={{opacity:1,y:0}} viewport={{once:true,margin:'-60px'}}
    transition={{duration:.7,delay,ease:[.215,.61,.355,1]}} className={className}>{children}</motion.div>;
}

/* ═══ MAGNETIC BTN ═══ */
function MagneticButton({children,className='',...props}){
  const ref=useRef(null);
  const move=e=>{const r=ref.current.getBoundingClientRect(),x=e.clientX-r.left-r.width/2,y=e.clientY-r.top-r.height/2;
    ref.current.style.transform=`translate(${x*.2}px,${y*.2}px)`};
  const leave=()=>{ref.current.style.transform='translate(0,0)'};
  return<motion.button ref={ref} onMouseMove={move} onMouseLeave={leave} whileTap={{scale:.95}}
    className={`transition-transform duration-300 ease-out ${className}`} {...props}>{children}</motion.button>;
}

/* ═══ TILT CARD ═══ */
function TiltCard({children,className='',glow=true}){
  const ref=useRef(null);
  const move=e=>{const r=ref.current.getBoundingClientRect(),x=(e.clientX-r.left)/r.width,y=(e.clientY-r.top)/r.height;
    ref.current.style.transition='transform .1s ease-out';
    ref.current.style.transform=`perspective(800px) rotateX(${(y-.5)*12}deg) rotateY(${(x-.5)*-12}deg) scale3d(1.02,1.02,1.02)`};
  const leave=()=>{ref.current.style.transition='transform .5s cubic-bezier(.215,.61,.355,1)';
    ref.current.style.transform='perspective(800px) rotateX(0) rotateY(0) scale3d(1,1,1)'};
  return<div ref={ref} onMouseMove={move} onMouseLeave={leave}
    className={`${glow?'hover:glow-accent':''} ${className}`}>{children}</div>;
}

/* ═══ SECTION HEADER ═══ */
function SectionHeader({num,label,title,desc}){
  return<div className="mb-14 md:mb-18">
    <Reveal><span className="text-accent/40 text-[11px] font-heading tracking-[.3em] uppercase mb-4 block">{num} — {label}</span></Reveal>
    <Reveal delay={.1}><h2 className="text-3xl sm:text-4xl md:text-5xl lg:text-[3.5rem] font-heading font-bold leading-[1.08] mb-4">{title}</h2></Reveal>
    {desc&&<Reveal delay={.2}><p className="text-dark-muted max-w-xl text-base md:text-lg leading-relaxed">{desc}</p></Reveal>}
  </div>;
}

/* ═══ MARQUEE ═══ */
function Marquee({text,reverse=false}){
  const t=`${text}  ·  ${text}  ·  ${text}  ·  ${text}  ·  `;
  return<div className="overflow-hidden py-5 md:py-7 border-y border-dark-border/40 select-none">
    <div className="whitespace-nowrap" style={{animation:`marquee ${reverse?32:28}s linear infinite ${reverse?'reverse':''}`}}>
      <span className="text-4xl md:text-6xl lg:text-7xl font-heading font-bold text-dark-border/40">{t}</span></div></div>;
}

/* ═══ COUNTER ═══ */
function useCounter(end,dur=2){
  const[count,setCount]=useState(0),[go,setGo]=useState(false),ref=useRef(null);
  useEffect(()=>{const o=new IntersectionObserver(([e])=>{if(e.isIntersecting)setGo(true)},{threshold:.5});
    if(ref.current)o.observe(ref.current);return()=>o.disconnect()},[]);
  useEffect(()=>{if(!go)return;let st;const step=ts=>{if(!st)st=ts;const p=Math.min((ts-st)/(dur*1000),1);
    setCount(Math.floor(p*end));if(p<1)requestAnimationFrame(step)};requestAnimationFrame(step)},[go,end,dur]);
  return[count,ref];
}

/* ═══ THREE.JS ═══ */
function ThreeScene(){
  const mount=useRef(null);
  useEffect(()=>{
    const mob=window.innerWidth<768,scene=new THREE.Scene(),w=window.innerWidth,h=window.innerHeight;
    const cam=new THREE.PerspectiveCamera(60,w/h,.1,100);cam.position.z=5;
    const ren=new THREE.WebGLRenderer({alpha:true,antialias:true});ren.setSize(w,h);
    ren.setPixelRatio(Math.min(window.devicePixelRatio,mob?1.5:2));mount.current.appendChild(ren.domElement);
    const outer=new THREE.Mesh(new THREE.IcosahedronGeometry(2.2,1),new THREE.MeshBasicMaterial({color:0x00ffd5,wireframe:true,transparent:true,opacity:.05}));
    const inner=new THREE.Mesh(new THREE.IcosahedronGeometry(1.3,1),new THREE.MeshBasicMaterial({color:0xa855f7,wireframe:true,transparent:true,opacity:.07}));
    const core=new THREE.Mesh(new THREE.SphereGeometry(.3,32,32),new THREE.MeshBasicMaterial({color:0x00ffd5,transparent:true,opacity:.03}));
    scene.add(outer,inner,core);
    const mkTex=(c)=>{const cv=document.createElement('canvas');cv.width=cv.height=64;const x=cv.getContext('2d');
      const g=x.createRadialGradient(32,32,0,32,32,32);g.addColorStop(0,c);g.addColorStop(.4,c.replace(',1)',',0.4)'));g.addColorStop(1,c.replace(',1)',',0)'));
      x.fillStyle=g;x.fillRect(0,0,64,64);return new THREE.CanvasTexture(cv)};
    const mkPts=(n,col,sz,op,rad1,rad2)=>{const pos=new Float32Array(n*3);
      for(let i=0;i<n;i++){const r=rad1+Math.random()*rad2,th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1);
        pos[i*3]=r*Math.sin(ph)*Math.cos(th);pos[i*3+1]=r*Math.sin(ph)*Math.sin(th);pos[i*3+2]=r*Math.cos(ph)}
      const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.BufferAttribute(pos,3));
      return new THREE.Points(g,new THREE.PointsMaterial({map:mkTex(col),size:sz,transparent:true,opacity:op,blending:THREE.AdditiveBlending,depthWrite:false,sizeAttenuation:true}))};
    const p1=mkPts(mob?200:800,'rgba(0,255,213,1)',mob?.05:.035,.45,2.5,5);
    const p2=mkPts(mob?60:250,'rgba(168,85,247,1)',mob?.04:.025,.3,3,4);
    const p3=mkPts(mob?40:150,'rgba(236,72,153,1)',mob?.04:.025,.2,4,3);
    scene.add(p1,p2,p3);
    let mx=0,my=0;const onM=e=>{mx=(e.clientX/window.innerWidth)*2-1;my=-(e.clientY/window.innerHeight)*2+1};
    window.addEventListener('mousemove',onM);
    const animate=()=>{requestAnimationFrame(animate);const t=performance.now()*.001;
      outer.rotation.x=t*.04+my*.2;outer.rotation.y=t*.06+mx*.2;
      inner.rotation.x=-t*.03+my*.12;inner.rotation.y=-t*.05+mx*.12;
      const b=1+Math.sin(t*.4)*.08;core.scale.set(b,b,b);
      p1.rotation.y=t*.01;p1.rotation.x=Math.sin(t*.007)*.06;
      p2.rotation.y=-t*.007;p2.rotation.z=Math.cos(t*.005)*.05;
      p3.rotation.x=t*.005;p3.rotation.z=-t*.004;
      ren.render(scene,cam)};animate();
    const onR=()=>{cam.aspect=window.innerWidth/window.innerHeight;cam.updateProjectionMatrix();ren.setSize(window.innerWidth,window.innerHeight)};
    window.addEventListener('resize',onR);
    return()=>{window.removeEventListener('resize',onR);window.removeEventListener('mousemove',onM);mount.current.removeChild(ren.domElement)}},[]);
  return<div ref={mount} className="fixed inset-0 -z-10"/>;
}

/* ═══ PRELOADER ═══ */
function Preloader({onDone}){
  const[c,setC]=useState(0);
  useEffect(()=>{const iv=setInterval(()=>setC(p=>{if(p>=100){clearInterval(iv);setTimeout(onDone,500);return 100}return p+1}),16);return()=>clearInterval(iv)},[]);
  return<motion.div exit={{y:'-100%'}} transition={{duration:.8,ease:[.76,0,.24,1]}}
    className="fixed inset-0 bg-dark z-[9998] flex flex-col items-center justify-center">
    <motion.span className="text-7xl md:text-9xl font-heading font-bold text-accent glow-text" style={{fontVariantNumeric:'tabular-nums'}}>{c}</motion.span>
    <div className="mt-6 w-48 h-[2px] bg-dark-border overflow-hidden rounded">
      <motion.div className="h-full bg-accent" initial={{width:'0%'}} animate={{width:`${c}%`}} transition={{duration:.08}}/></div>
    <span className="mt-4 text-dark-muted text-[10px] tracking-[.35em] uppercase font-heading">Loading Experience</span>
  </motion.div>;
}

/* ═══ NAVBAR ═══ */
function Navbar({refs}){
  const[sc,setSc]=useState(false),[op,setOp]=useState(false);
  useEffect(()=>{const h=()=>setSc(window.scrollY>50);window.addEventListener('scroll',h);return()=>window.removeEventListener('scroll',h)},[]);
  const go=r=>{r.current.scrollIntoView({behavior:'smooth'});setOp(false)};
  const items=[{n:'About',r:refs.aboutRef},{n:'Expertise',r:refs.skillsRef},{n:'Services',r:refs.servicesRef},{n:'Work',r:refs.projectsRef},{n:'Team',r:refs.teamRef},{n:'Contact',r:refs.contactRef}];
  return<motion.nav initial={{opacity:0,y:-20}} animate={{opacity:1,y:0}} transition={{duration:.6,delay:1.6}}
    className={`fixed w-full z-50 transition-all duration-500 ${sc?'bg-dark/80 backdrop-blur-xl border-b border-dark-border/40 py-3':'bg-transparent py-5'}`}>
    <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
      <motion.button whileHover={{scale:1.05}} onClick={()=>go(refs.aboutRef)} className="font-heading font-bold text-lg tracking-tight text-white" data-hover>WA<span className="text-accent">.</span></motion.button>
      <div className="hidden md:flex items-center gap-1">
        {items.map(it=><motion.button key={it.n} whileHover={{scale:1.05}} whileTap={{scale:.95}} onClick={()=>go(it.r)}
          className="px-3 py-2 text-[13px] text-dark-muted hover:text-accent transition-colors duration-300 font-heading relative group" data-hover>{it.n}
          <span className="absolute bottom-0 left-1/2 -translate-x-1/2 w-0 h-[1px] bg-accent group-hover:w-3/4 transition-all duration-300"/></motion.button>)}
      </div>
      <motion.button whileTap={{scale:.9}} onClick={()=>setOp(!op)} className="md:hidden w-10 h-10 flex flex-col items-center justify-center gap-1.5" data-hover>
        <motion.span animate={op?{rotate:45,y:6}:{rotate:0,y:0}} className="w-5 h-[1.5px] bg-accent block origin-center"/>
        <motion.span animate={op?{opacity:0}:{opacity:1}} className="w-5 h-[1.5px] bg-accent block"/>
        <motion.span animate={op?{rotate:-45,y:-6}:{rotate:0,y:0}} className="w-5 h-[1.5px] bg-accent block origin-center"/>
      </motion.button>
    </div>
    <AnimatePresence>{op&&<motion.div initial={{opacity:0,height:0}} animate={{opacity:1,height:'auto'}} exit={{opacity:0,height:0}} transition={{duration:.3}}
      className="md:hidden bg-dark/95 backdrop-blur-xl border-b border-dark-border/50 overflow-hidden">
      <div className="px-6 py-4 space-y-1">{items.map((it,i)=><motion.button key={it.n} initial={{opacity:0,x:-20}} animate={{opacity:1,x:0}} transition={{delay:i*.04}}
        onClick={()=>go(it.r)} className="block w-full text-left py-3 text-lg font-heading text-dark-muted hover:text-accent transition-colors">{it.n}</motion.button>)}</div>
    </motion.div>}</AnimatePresence>
  </motion.nav>;
}

/* ═══ HERO ═══ */
function Hero({refs}){

    <div className="absolute inset-0 bg-gradient-to-b from-dark via-dark/50 to-dark pointer-events-none"/>

        <MagneticButton onClick={()=>refs.projectsRef.current.scrollIntoView({behavior:'smooth'})} className="border border-dark-border text-white/70 font-heading font-medium py-3.5 px-8 rounded-full text-sm tracking-wide hover:border-accent/30 hover:text-accent transition-all" data-hover>View Work →</MagneticButton>

/* ═══ STATS ═══ */
function Stats(){
  const s=[{n:10,label:'Projects Shipped'},{n:5,label:'Happy Clients'},{n:1,label:'Year of Production Code'},{n:18,label:'Years Old'}];
