<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wendel Andrady — AI Systems & Business Automation</title>
  <meta name="description" content="I build AI-powered systems that generate leads, automate operations, and create recurring revenue. Delivered in 5–7 days.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
  <script src="https://unpkg.com/three@0.132.2/build/three.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config={theme:{extend:{colors:{
      ink:'#0C0C0E',
      'ink-card':'#111114',
      'ink-border':'#1E1E24',
      'ink-muted':'#5A5A6E',
      'ink-subtle':'#38383F',
      lime:'#D4F544',
      'lime-dim':'#AECB32',
      amber:'#F5A623',
      rose:'#FF6B6B',
    },fontFamily:{
      display:['"Instrument Serif"','serif'],
      sans:['"Syne"','sans-serif'],
      mono:['"DM Mono"','monospace'],
    }}}}
  </script>
  <style>
    :root{
      --lime:#D4F544;--lime-dim:#AECB32;--ink:#0C0C0E;--ink-card:#111114;
      --ink-border:#1E1E24;--ink-muted:#5A5A6E;--ink-subtle:#38383F;
    }
    *,*::before,*::after{box-sizing:border-box;cursor:none;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{background:var(--ink);color:#E8E8F0;font-family:'Syne',sans-serif;overflow-x:hidden;-webkit-font-smoothing:antialiased}
    ::-webkit-scrollbar{width:2px}
    ::-webkit-scrollbar-track{background:var(--ink)}
    ::-webkit-scrollbar-thumb{background:var(--lime);border-radius:99px}
    ::selection{background:rgba(212,245,68,.18);color:#fff}

    /* grid texture */
    .grid-tex{background-image:linear-gradient(rgba(255,255,255,.022) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.022) 1px,transparent 1px);background-size:48px 48px}
    /* glow helpers */
    .glow-lime{box-shadow:0 0 60px rgba(212,245,68,.1),0 0 120px rgba(212,245,68,.04)}
    .glow-lime-btn{box-shadow:0 0 30px rgba(212,245,68,.25),0 4px 24px rgba(212,245,68,.1)}
    /* text styles */
    .display{font-family:'Instrument Serif',serif;line-height:1;letter-spacing:-.02em}
    .mono-label{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-muted)}
    /* card */
    .card{background:var(--ink-card);border:1px solid var(--ink-border);border-radius:20px;padding:32px;transition:border-color .4s,box-shadow .4s}
    .card:hover{border-color:rgba(212,245,68,.18);box-shadow:0 0 50px rgba(212,245,68,.05)}
    /* pill */
    .pill{display:inline-flex;align-items:center;padding:5px 14px;border-radius:999px;background:rgba(212,245,68,.08);border:1px solid rgba(212,245,68,.14);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--lime)}
    /* inputs */
    .field{width:100%;padding:15px 20px;background:var(--ink-card);border:1px solid var(--ink-border);border-radius:14px;color:#E8E8F0;font-family:'Syne',sans-serif;font-size:15px;outline:none;transition:border-color .3s,box-shadow .3s}
    .field:focus{border-color:rgba(212,245,68,.4);box-shadow:0 0 0 2px rgba(212,245,68,.07)}
    .field::placeholder{color:var(--ink-muted)}
    /* buttons */
    .btn-lime{background:var(--lime);color:var(--ink);font-family:'Syne',sans-serif;font-weight:700;padding:16px 36px;border-radius:999px;font-size:15px;letter-spacing:.01em;border:none;transition:background .25s,box-shadow .25s;box-shadow:0 0 30px rgba(212,245,68,.2)}
    .btn-lime:hover{background:var(--lime-dim);box-shadow:0 0 50px rgba(212,245,68,.4)}
    .btn-ghost{background:transparent;color:#E8E8F0;font-family:'Syne',sans-serif;font-weight:500;padding:16px 36px;border-radius:999px;font-size:15px;border:1px solid var(--ink-border);transition:border-color .25s,color .25s}
    .btn-ghost:hover{border-color:rgba(212,245,68,.3);color:var(--lime)}
    /* check + cross */
    .chk{width:22px;height:22px;border-radius:50%;background:rgba(212,245,68,.09);border:1px solid rgba(212,245,68,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .xmk{width:22px;height:22px;border-radius:50%;background:rgba(255,107,107,.08);border:1px solid rgba(255,107,107,.18);display:flex;align-items:center;justify-content:center;flex-shrink:0}
    /* number big */
    .num-xl{font-family:'Instrument Serif',serif;font-size:clamp(52px,8vw,88px);line-height:1;color:var(--lime)}
    /* scrollbar */
    .marquee-track{display:inline-flex;animation:mq 32s linear infinite;white-space:nowrap}
    .marquee-track-rev{animation-direction:reverse;animation-duration:38s}
    @keyframes mq{from{transform:translateX(0)}to{transform:translateX(-50%)}}
    /* step big number */
    .step-ghost{font-family:'Instrument Serif',serif;font-size:120px;line-height:1;color:rgba(212,245,68,.06);position:absolute;top:-20px;right:20px;pointer-events:none;user-select:none}
    /* service accent bar */
    .svc-bar{width:3px;height:40px;border-radius:99px;background:var(--lime);flex-shrink:0;opacity:.5;transition:opacity .3s}
    .card:hover .svc-bar{opacity:1}
    @media(hover:none){*{cursor:auto!important}.cc,.cr{display:none!important}a,button,input,textarea,select{cursor:auto!important}}
    @media(max-width:640px){
      .sm-full{width:100%!important}
      .sm-center{text-align:center!important}
    }
  </style>
</head>
<body class="grid-tex">
<div id="root"></div>
<script type="text/babel">
const{useState,useRef,useEffect}=React;
const{motion,AnimatePresence}=window.Motion;

/* ══ CURSOR ══ */
function Cursor(){
  const dot=useRef(null),ring=useRef(null);
  useEffect(()=>{
    let mx=0,my=0,rx=0,ry=0;
    const mv=e=>{
      mx=e.clientX;my=e.clientY;
      if(dot.current)dot.current.style.transform=`translate(${mx-4}px,${my-4}px)`;
      const t=e.target.closest('a,button,input,textarea,select,[data-h]');
      if(ring.current){
        const s=t?'54px':'38px',o=t?-27:-19;
        ring.current.style.width=s;ring.current.style.height=s;
        ring.current.style.left=o+'px';ring.current.style.top=o+'px';
        ring.current.style.borderColor=t?'#D4F544':'rgba(212,245,68,.28)';
        ring.current.style.opacity=t?'1':'0.6'}
    };
    const lp=()=>{rx+=(mx-rx)*.12;ry+=(my-ry)*.12;
      if(ring.current)ring.current.style.transform=`translate(${rx}px,${ry}px)`;
      requestAnimationFrame(lp)};
    window.addEventListener('mousemove',mv);lp();
    return()=>window.removeEventListener('mousemove',mv)
  },[]);
  return<>
    <div ref={dot} className="cc fixed w-2 h-2 rounded-full pointer-events-none z-[10000]" style={{background:'#D4F544',mixBlendMode:'difference'}}/>
    <div ref={ring} className="cr fixed w-[38px] h-[38px] border rounded-full pointer-events-none z-[10000]" style={{borderColor:'rgba(212,245,68,.28)',transition:'width .2s,height .2s,left .2s,top .2s,border-color .2s,opacity .2s'}}/>
  </>;
}

/* ══ SCROLL BAR ══ */
function ProgressBar(){
  const[p,setP]=useState(0);
  useEffect(()=>{
    const h=()=>{const t=document.documentElement.scrollHeight-window.innerHeight;setP(window.scrollY/t*100)};
    window.addEventListener('scroll',h);return()=>window.removeEventListener('scroll',h)
  },[]);
  return<div className="fixed top-0 left-0 h-[2px] z-[9998]" style={{width:`${p}%`,background:'#D4F544'}}/>;
}

/* ══ REVEAL ══ */
function R({children,d=0,className='',y=28}){
  return<motion.div initial={{opacity:0,y}} whileInView={{opacity:1,y:0}}
    viewport={{once:true,margin:'-40px'}} transition={{duration:.68,delay:d,ease:[.215,.61,.355,1]}}
    className={className}>{children}</motion.div>;
}

/* ══ THREE ══ */
function ThreeBG(){
  const m=useRef(null);
  useEffect(()=>{
    const mob=window.innerWidth<768,W=window.innerWidth,H=window.innerHeight;
    const s=new THREE.Scene(),cam=new THREE.PerspectiveCamera(60,W/H,.1,100);cam.position.z=5;
    const ren=new THREE.WebGLRenderer({alpha:true,antialias:true});
    ren.setSize(W,H);ren.setPixelRatio(Math.min(window.devicePixelRatio,mob?1.5:2));
    m.current.appendChild(ren.domElement);
    const geo1=new THREE.IcosahedronGeometry(2.1,1),mat1=new THREE.MeshBasicMaterial({color:0xD4F544,wireframe:true,transparent:true,opacity:.04});
    const geo2=new THREE.IcosahedronGeometry(1.25,1),mat2=new THREE.MeshBasicMaterial({color:0xF5A623,wireframe:true,transparent:true,opacity:.04});
    const o1=new THREE.Mesh(geo1,mat1),o2=new THREE.Mesh(geo2,mat2);
    s.add(o1,o2);
    const mkT=c=>{const cv=document.createElement('canvas');cv.width=cv.height=64;const x=cv.getContext('2d');
      const g=x.createRadialGradient(32,32,0,32,32,32);g.addColorStop(0,c);g.addColorStop(.4,c.replace(',1)',',0.35)'));g.addColorStop(1,c.replace(',1)',',0)'));
      x.fillStyle=g;x.fillRect(0,0,64,64);return new THREE.CanvasTexture(cv)};
    const mkP=(n,col,sz,op,r1,r2)=>{
      const pos=new Float32Array(n*3);
      for(let i=0;i<n;i++){const r=r1+Math.random()*r2,t=Math.random()*Math.PI*2,p=Math.acos(2*Math.random()-1);
        pos[i*3]=r*Math.sin(p)*Math.cos(t);pos[i*3+1]=r*Math.sin(p)*Math.sin(t);pos[i*3+2]=r*Math.cos(p)}
      const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.BufferAttribute(pos,3));
      return new THREE.Points(g,new THREE.PointsMaterial({map:mkT(col),size:sz,transparent:true,opacity:op,blending:THREE.AdditiveBlending,depthWrite:false,sizeAttenuation:true}))};
    const p1=mkP(mob?150:600,'rgba(212,245,68,1)',mob?.05:.03,.4,2.5,5);
    const p2=mkP(mob?40:160,'rgba(245,166,35,1)',mob?.04:.025,.25,3,4);
    s.add(p1,p2);
    let mx=0,my=0;const onM=e=>{mx=(e.clientX/W)*2-1;my=-(e.clientY/H)*2+1};
    window.addEventListener('mousemove',onM);
    const tick=()=>{requestAnimationFrame(tick);const t=performance.now()*.001;
      o1.rotation.x=t*.035+my*.18;o1.rotation.y=t*.055+mx*.18;
      o2.rotation.x=-t*.028+my*.1;o2.rotation.y=-t*.04+mx*.1;
      p1.rotation.y=t*.009;p2.rotation.y=-t*.006;ren.render(s,cam)};
    tick();
    const onR=()=>{cam.aspect=window.innerWidth/window.innerHeight;cam.updateProjectionMatrix();ren.setSize(window.innerWidth,window.innerHeight)};
    window.addEventListener('resize',onR);
    return()=>{try{window.removeEventListener('resize',onR);window.removeEventListener('mousemove',onM);if(m.current)m.current.removeChild(ren.domElement)}catch(e){}};
  },[]);
  return<div ref={m} className="fixed inset-0 -z-10"/>;
}

/* ══ PRELOADER ══ */
function Preloader({done}){
  const[c,setC]=useState(0);
  useEffect(()=>{
    const iv=setInterval(()=>setC(p=>{if(p>=100){clearInterval(iv);setTimeout(done,350);return 100}return p+2}),18);
    return()=>clearInterval(iv)
  },[]);
  return<motion.div exit={{y:'-100%'}} transition={{duration:.75,ease:[.76,0,.24,1]}}
    className="fixed inset-0 z-[9999] flex flex-col items-center justify-center" style={{background:'#0C0C0E'}}>
    <div style={{fontFamily:'Instrument Serif',fontSize:'clamp(80px,14vw,140px)',color:'#D4F544',lineHeight:1}}>{c}</div>
    <div className="mt-5 w-36 h-[1px] overflow-hidden" style={{background:'#1E1E24'}}>
      <motion.div className="h-full" initial={{width:'0%'}} animate={{width:`${c}%`}} style={{background:'#D4F544'}}/></div>
    <div style={{fontFamily:'DM Mono',fontSize:'11px',color:'#2a2a30',letterSpacing:'.25em',marginTop:'14px'}}>LOADING</div>
  </motion.div>;
}

/* ══ NAVBAR ══ */
function Nav({refs}){
  const[sc,setSc]=useState(false),[mo,setMo]=useState(false);
  useEffect(()=>{const h=()=>setSc(window.scrollY>50);window.addEventListener('scroll',h);return()=>window.removeEventListener('scroll',h)},[]);
  const go=r=>{r.current.scrollIntoView({behavior:'smooth'});setMo(false)};
  const links=[{l:'Problem',r:refs.prob},{l:'Services',r:refs.svc},{l:'Work',r:refs.work},{l:'Process',r:refs.proc},{l:'Contact',r:refs.ctRef}];
  return<motion.nav initial={{opacity:0,y:-20}} animate={{opacity:1,y:0}} transition={{duration:.6,delay:1.5}}
    className="fixed w-full z-50"
    style={{background:sc?'rgba(12,12,14,.88)':'transparent',backdropFilter:sc?'blur(22px)':'none',borderBottom:sc?'1px solid #1E1E24':'none',padding:sc?'12px 0':'22px 0',transition:'all .4s'}}>
    <div className="max-w-6xl mx-auto px-6 flex items-center justify-between">
      <button onClick={()=>refs.hero.current.scrollIntoView({behavior:'smooth'})} data-h
        style={{fontFamily:'Syne',fontWeight:800,fontSize:'18px',letterSpacing:'-.01em',color:'#E8E8F0'}}>
        Wendel<span style={{color:'#D4F544'}}>.</span>
      </button>
      <div className="hidden md:flex items-center gap-1">
        {links.map(l=><button key={l.l} onClick={()=>go(l.r)} data-h
          className="px-4 py-2 text-sm font-sans transition-colors duration-300"
          style={{color:'#5A5A6E'}}
          onMouseEnter={e=>e.currentTarget.style.color='#D4F544'}
          onMouseLeave={e=>e.currentTarget.style.color='#5A5A6E'}>{l.l}</button>)}
        <button onClick={()=>go(refs.ctRef)} data-h className="btn-lime ml-3 py-2.5 px-6 text-sm">Book a Call</button>
      </div>
      <button onClick={()=>setMo(!mo)} data-h className="md:hidden flex flex-col items-center justify-center gap-1.5 w-10 h-10">
        <motion.span animate={mo?{rotate:45,y:6}:{rotate:0,y:0}} className="w-5 h-[1.5px] block origin-center" style={{background:'#D4F544'}}/>
        <motion.span animate={mo?{opacity:0}:{opacity:1}} className="w-5 h-[1.5px] block" style={{background:'#D4F544'}}/>
        <motion.span animate={mo?{rotate:-45,y:-6}:{rotate:0,y:0}} className="w-5 h-[1.5px] block origin-center" style={{background:'#D4F544'}}/>
      </button>
    </div>
    <AnimatePresence>{mo&&
      <motion.div initial={{opacity:0,height:0}} animate={{opacity:1,height:'auto'}} exit={{opacity:0,height:0}} transition={{duration:.28}}
        className="md:hidden overflow-hidden" style={{background:'rgba(12,12,14,.96)',backdropFilter:'blur(20px)',borderTop:'1px solid #1E1E24'}}>
        <div className="px-6 py-5 space-y-1">
          {links.map((l,i)=><motion.button key={l.l} initial={{opacity:0,x:-14}} animate={{opacity:1,x:0}} transition={{delay:i*.04}}
            onClick={()=>go(l.r)} className="block w-full text-left py-3 text-lg" style={{color:'#5A5A6E'}}>{l.l}</motion.button>)}
          <button onClick={()=>go(refs.ctRef)} className="btn-lime w-full mt-4 text-center block">Book a Call</button>
        </div>
      </motion.div>}
    </AnimatePresence>
  </motion.nav>;
}

/* ══ HERO ══ */
function Hero({refs}){
  return<section ref={refs.hero} className="relative min-h-screen flex items-center justify-center overflow-hidden" style={{paddingTop:'80px'}}>
    <ThreeBG/>
    <div className="absolute inset-0 pointer-events-none" style={{background:'linear-gradient(to bottom,#0C0C0E 0%,transparent 15%,transparent 82%,#0C0C0E 100%)'}}/>
    <div className="relative z-10 text-center px-6 max-w-5xl w-full">

      {/* Label */}
      <R d={1.7}><div className="pill mx-auto mb-7 inline-block">AI Systems &amp; Business Automation</div></R>

      {/* Headline */}
      <div className="overflow-hidden mb-6">
        <motion.h1 initial={{y:110,opacity:0}} animate={{y:0,opacity:1}} transition={{duration:.85,delay:1.9,ease:[.215,.61,.355,1]}}
          className="display" style={{fontSize:'clamp(46px,9.5vw,110px)',color:'#E8E8F0'}}>
          Your business deserves<br/>
          <em style={{color:'#D4F544',fontStyle:'italic'}}>systems that sell.</em>
        </motion.h1>
      </div>

      {/* Sub */}
      <R d={2.3}>
        <p className="text-base md:text-lg max-w-xl mx-auto leading-relaxed mb-10" style={{color:'#5A5A6E'}}>
          I'm <strong style={{color:'#E8E8F0',fontWeight:600}}>Wendel Andrady</strong> — I build AI-powered systems that capture leads, automate your operations, and generate recurring revenue. Delivered in <strong style={{color:'#D4F544',fontWeight:600}}>5–7 days.</strong>
        </p>
      </R>

      {/* CTAs */}
      <R d={2.5} className="flex flex-col sm:flex-row items-center justify-center gap-4">
        <motion.button whileHover={{scale:1.04}} whileTap={{scale:.96}} data-h
          onClick={()=>refs.ctRef.current.scrollIntoView({behavior:'smooth'})}
          className="btn-lime glow-lime-btn sm-full">Book a Free Call →</motion.button>
        <motion.button whileHover={{scale:1.04}} whileTap={{scale:.96}} data-h
          onClick={()=>refs.work.current.scrollIntoView({behavior:'smooth'})}
          className="btn-ghost sm-full">See My Work</motion.button>
      </R>

      {/* Mini stats */}
      <R d={2.8} className="mt-14 flex flex-wrap items-center justify-center gap-10">
        {[{n:'15K+',l:'Users Across Products'},{n:'$1K–$5K',l:'Project Range'},{n:'5–7 Days',l:'Average Delivery'},{n:'18 y/o',l:'Builder'}].map((s,i)=>
          <div key={i} className="text-center">
            <div className="num-xl">{s.n}</div>
            <div className="mono-label mt-1">{s.l}</div>
          </div>)}
      </R>
    </div>

    {/* Scroll indicator */}
    <motion.div className="absolute bottom-8 left-1/2 -translate-x-1/2 z-10" animate={{y:[0,7,0]}} transition={{duration:2.4,repeat:Infinity,ease:'easeInOut'}}>
      <div className="w-5 h-8 rounded-full flex justify-center pt-2" style={{border:'1px solid #1E1E24'}}>
        <motion.div className="w-1 h-2 rounded-full" style={{background:'rgba(212,245,68,.4)'}} animate={{y:[0,8,0],opacity:[1,.2,1]}} transition={{duration:2.4,repeat:Infinity,ease:'easeInOut'}}/>
      </div>
    </motion.div>
  </section>;
}

/* ══ MARQUEE ══ */
function Marquee({t,rev}){
  const txt=`${t}  ·  ${t}  ·  ${t}  ·  ${t}  ·  `;
  return<div className="overflow-hidden py-5 md:py-6" style={{borderTop:'1px solid #1E1E24',borderBottom:'1px solid #1E1E24'}}>
    <div className={`marquee-track ${rev?'marquee-track-rev':''}`}>
      <span style={{fontFamily:'Instrument Serif',fontSize:'clamp(42px,7vw,80px)',color:'rgba(255,255,255,.05)',whiteSpace:'nowrap'}}>{txt}</span>
    </div>
  </div>;
}

/* ══ PROBLEM ══ */
function Problem({sRef}){
  const pains=[
    {t:'You\'re not getting enough leads',d:'Your pipeline is dry. You\'re relying on referrals and hoping the phone rings.'},
    {t:'Too much time lost to manual work',d:'Your team is buried in tasks that should take seconds — scheduling, follow-ups, data entry.'},
    {t:'Your systems are outdated or nonexistent',d:'No lead tracking, no client portal, no automation. Just scattered spreadsheets and missed opportunities.'},
    {t:'Revenue isn\'t predictable',d:'You have no recurring income. Every month starts at zero.'},
  ];
  return<section ref={sRef} className="py-24 md:py-32">
    <div className="max-w-6xl mx-auto px-6">
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-16 items-start">
        <div>
          <R><span className="mono-label block mb-5">01 — the problem</span></R>
          <R d={.1}>
            <h2 className="display mb-5" style={{fontSize:'clamp(38px,5.5vw,64px)',color:'#E8E8F0'}}>
              Most service businesses are<br/><em style={{color:'#D4F544'}}>bleeding revenue</em><br/>they don't even see.
            </h2>
          </R>
          <R d={.2}>
            <p className="leading-relaxed mb-8" style={{fontSize:'16px',color:'#5A5A6E'}}>
              Bad systems don't feel urgent — until you realise how much money walked out the door while you were doing everything manually.
            </p>
          </R>
          <R d={.3}>
            <button className="btn-lime glow-lime-btn" data-h
              onClick={()=>document.getElementById('cta').scrollIntoView({behavior:'smooth'})}>Fix My Business →</button>
          </R>
        </div>
        <div className="space-y-0">
          {pains.map((p,i)=>
            <R key={i} d={i*.07}>
              <div className="flex gap-4 py-5" style={{borderBottom:'1px solid #1E1E24'}}>
                <div className="xmk mt-1">
                  <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 2l6 6M8 2l-6 6" stroke="rgba(255,107,107,.7)" strokeWidth="1.5" strokeLinecap="round"/></svg>
                </div>
                <div>
                  <p className="font-sans font-600 text-sm mb-1" style={{color:'#E8E8F0',fontWeight:600}}>{p.t}</p>
                  <p className="text-sm leading-relaxed" style={{color:'#5A5A6E'}}>{p.d}</p>
                </div>
              </div>
            </R>)}
        </div>
      </div>
    </div>
  </section>;
}

/* ══ SERVICES ══ */
function Services({sRef}){
  const svcs=[
